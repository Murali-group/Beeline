# Configuration for generateExpInputs.py
# Corresponds to the CLI call in genInputs.sh

settings:
  outputDirectory: gen_inputs_testing

datasets:

  #################### MOUSE STRING ####################

  - dataset_id: mouse-mHSC-E-500-string
    expFile: ./data/BEELINE-data/inputs/scRNA-Seq/mHSC-E/ExpressionData.csv
    geneOrderingFile: ./data/BEELINE-data/inputs/scRNA-Seq/mHSC-E/GeneOrdering.csv
    pseudoTimeFile: ./data/BEELINE-data/inputs/scRNA-Seq/mHSC-E/PseudoTime.csv
    netFile: ./data/Networks/mouse/STRING-network.csv
    TFFile: ./data/mouse-tfs.csv

    pVal: 0.01          # p-value cutoff for filtering variable genes
    BFcorr: true        # apply Bonferroni correction to pVal
    TFs: true           # force-include all significantly varying TFs in the gene set
    numGenes: 500       # number of non-TF genes to include
    sortByVariance: true  # rank non-TF genes by variance (false = rank by p-value)

